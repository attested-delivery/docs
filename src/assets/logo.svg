<svg width="240" height="64" viewBox="0 0 240 64" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="attested-delivery">
  <title>attested-delivery</title>
  <desc>A hexagonal seal — the content digest — with a verification check struck through its center. The single broken notch on the lower-left edge marks the threat the seal is closed against.</desc>
  <!-- Mark: hexagon seal + verification check -->
  <g transform="translate(8 8)" fill="none" stroke="#36D399" stroke-width="3" stroke-linejoin="round" stroke-linecap="round">
    <!-- Hexagon seal with one deliberately broken notch (lower-left) -->
    <path d="M24 2 L43 13 L43 35 L24 46 L9 37.5" />
    <path d="M5 35 L5 13 L24 2" />
    <!-- The threat notch: a short red segment where the seal is held closed -->
    <path d="M9 37.5 L5 35" stroke="#FF5C6C" stroke-width="3" />
    <!-- Verification check, centered -->
    <path d="M15 24 L21 31 L34 16" stroke-width="4" />
  </g>
  <!-- Wordmark -->
  <text x="64" y="33" font-family="ui-monospace, 'SF Mono', 'JetBrains Mono', Menlo, Consolas, monospace" font-size="18" font-weight="700" letter-spacing="-0.01em" fill="#E8EEF6">attested</text>
  <text x="64" y="33" font-family="ui-monospace, 'SF Mono', 'JetBrains Mono', Menlo, Consolas, monospace" font-size="18" font-weight="700" letter-spacing="-0.01em" fill="#E8EEF6" opacity="0"> </text>
  <text x="64" y="52" font-family="ui-monospace, 'SF Mono', 'JetBrains Mono', Menlo, Consolas, monospace" font-size="18" font-weight="400" letter-spacing="-0.01em" fill="#36D399">delivery</text>
</svg>
