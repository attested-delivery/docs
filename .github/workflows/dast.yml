name: DAST (attested)

# Attested DAST for the deployed docs site. Points the central ZAP reusable at
# the running site, signs the verdict as dast/v1 bound to a subject digest, and
# fail-closed verifies it:
#   subject (provenance) -> gate-dast (ZAP) -> attest-dast (seam) -> verify
#
# `fail-action: false` keeps the gate advisory: the verdict is signed and
# attested regardless of findings (signed != passed; policy reads the predicate).
#
# Requires the org Actions allow-list to permit `zaproxy/action-full-scan@*`.

on:
  workflow_dispatch:
    inputs:
      target:
        description: "URL of the running docs site to scan"
        required: false
        default: "https://attested-delivery.github.io/docs"
        type: string

permissions:
  contents: read

jobs:
  subject:
    name: Subject Snapshot
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      attestations: write
    outputs:
      subject-name: ${{ steps.pack.outputs.name }}
      subject-digest: ${{ steps.pack.outputs.digest }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Pack subject snapshot
        id: pack
        run: |
          set -euo pipefail
          mkdir -p dist
          FILE="docs-dast-subject.tar.gz"
          git archive --format=tar.gz -o "dist/${FILE}" "${GITHUB_SHA}"
          DIGEST=$(sha256sum "dist/${FILE}" | cut -d' ' -f1)
          echo "name=${FILE}" >> "$GITHUB_OUTPUT"
          echo "digest=sha256:${DIGEST}" >> "$GITHUB_OUTPUT"
      - uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: dist/${{ steps.pack.outputs.name }}
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: docs-dast-subject
          path: dist/${{ steps.pack.outputs.name }}
          if-no-files-found: error

  gate-dast:
    name: Gate — DAST (ZAP)
    permissions:
      contents: read
    # attested-delivery/.github main @ 698148e (post-#4, 2026-06-19)
    uses: attested-delivery/.github/.github/workflows/reusable-zap.yml@698148e12da113cfeeef8742c31ae93657959e67
    with:
      target: ${{ inputs.target }}
      fail-action: false

  attest-dast:
    name: Attest — DAST
    needs: [subject, gate-dast]
    permissions:
      id-token: write
      attestations: write
      contents: read
    # attested-delivery/.github main @ 698148e (post-#4, 2026-06-19)
    uses: attested-delivery/.github/.github/workflows/reusable-attest-scan.yml@698148e12da113cfeeef8742c31ae93657959e67
    with:
      subject-name: ${{ needs.subject.outputs.subject-name }}
      subject-digest: ${{ needs.subject.outputs.subject-digest }}
      predicate-type: https://attested-delivery.github.io/attestations/dast/v1
      predicate-artifact: ${{ needs.gate-dast.outputs.report-artifact }}
      predicate-filename: ${{ needs.gate-dast.outputs.report-filename }}

  verify:
    name: Verify Attestations (fail-closed)
    needs: [subject, attest-dast]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      attestations: read
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: docs-dast-subject
          path: subject
      - name: Fail-closed attestation verification
        env:
          GH_TOKEN: ${{ github.token }}
          OWNER: ${{ github.repository_owner }}
          SEAM: attested-delivery/.github/.github/workflows/reusable-attest-scan.yml
          SUBJECT_NAME: ${{ needs.subject.outputs.subject-name }}
        run: |
          set -euo pipefail
          SUBJECT="subject/${SUBJECT_NAME}"
          gh attestation verify "${SUBJECT}" \
            --repo "${GITHUB_REPOSITORY}" \
            --predicate-type https://slsa.dev/provenance/v1
          gh attestation verify "${SUBJECT}" \
            --owner "${OWNER}" \
            --signer-workflow "${SEAM}" \
            --predicate-type https://attested-delivery.github.io/attestations/dast/v1
          echo "Verified: SLSA provenance + DAST verdict (dast/v1)"
