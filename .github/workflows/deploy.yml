name: Deploy docs to GitHub Pages

# Attested GitHub Pages deploy — the docs site as a fail-closed, attested use
# case of the org's own posture:
#   pin-check (central reusable)  →  build + attest  →  verify (fail-closed)  →  deploy
#
# What is attested, and by what:
#   - SLSA build provenance for the published Pages artifact — actions/attest-build-provenance
#   - CycloneDX SBOM of the site's dependencies — anchore/sbom-action (Syft) + actions/attest-sbom
# Both are keyless via the run's OIDC id-token; both bind to the artifact's
# sha256 digest and are independently re-verifiable (see SECURITY.md).
#
# This is a static-file artifact (not a container image), so:
#   - the SLSA backbone is actions/attest-build-provenance (gate-catalog row 8),
#     not the image-only central sign-and-attest.yml;
#   - the fail-closed verify runs `gh attestation verify` inline on the artifact
#     file, since the central reusable-verify-gates.yml verifies oci:// subjects
#     by digest, not a caller-local file.
# Pin enforcement itself is delegated to the central pin-check.yml reusable.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  # Fail-closed pin gate: every `uses:` in this repo must be a 40-char SHA.
  pin-check:
    permissions:
      contents: read
    uses: attested-delivery/.github/.github/workflows/pin-check.yml@0e8ba553a55146eddf66e027f157b3cbb294466a

  build:
    needs: pin-check
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write # actions/configure-pages
      id-token: write # keyless OIDC for the attestations
      attestations: write # persist the SLSA provenance + SBOM attestations
    outputs:
      artifact-digest: ${{ steps.digest.outputs.sha256 }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
      # Enable pnpm via Node's built-in corepack rather than the third-party
      # pnpm/action-setup, so this workflow runs under a restrictive org
      # Actions allow-list with no extra entry.
      - run: |
          corepack enable
          corepack prepare pnpm@9.15.9 --activate
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5.0.0
      # Package the Pages artifact inline instead of actions/upload-pages-artifact,
      # whose composite internals call a tag-pinned actions/upload-artifact@v4 —
      # which the org's (correct, foundational) "require SHA-pinned actions" rule
      # rejects transitively. This replicates that action exactly, but every
      # action stays SHA-pinned.
      - name: Package Pages artifact
        run: |
          tar \
            --dereference --hard-dereference \
            --directory dist \
            -cvf "${RUNNER_TEMP}/artifact.tar" \
            --exclude=.git \
            --exclude=.github \
            .
      - name: Record artifact digest
        id: digest
        run: echo "sha256=$(sha256sum "${RUNNER_TEMP}/artifact.tar" | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"
      # CycloneDX SBOM of the site's dependencies via Syft (allow-listed SBOM tool).
      - name: Generate CycloneDX SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          path: .
          format: cyclonedx-json
          output-file: sbom.cdx.json
          upload-artifact: false
          upload-release-assets: false
      # SLSA build provenance bound to the published artifact's digest (keyless).
      - name: Attest build provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: ${{ runner.temp }}/artifact.tar
      # Attest the CycloneDX SBOM against the same subject digest (keyless).
      - name: Attest SBOM
        uses: actions/attest-sbom@c604332985a26aa8cf1bdc465b92731239ec6b9e # v4.1.0
        with:
          subject-path: ${{ runner.temp }}/artifact.tar
          sbom-path: sbom.cdx.json
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: github-pages
          path: ${{ runner.temp }}/artifact.tar
          retention-days: 1
          if-no-files-found: error

  # Fail-closed gate: an unverifiable artifact does not deploy. Re-verifies the
  # SLSA provenance and the CycloneDX SBOM against the artifact's digest before
  # the deploy job is allowed to run.
  verify:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      attestations: read
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: github-pages
          path: artifact
      - name: Verify provenance + SBOM (fail-closed)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh attestation verify artifact/artifact.tar \
            --repo "${GITHUB_REPOSITORY}" \
            --signer-workflow "${GITHUB_REPOSITORY}/.github/workflows/deploy.yml" \
            --predicate-type https://slsa.dev/provenance/v1
          gh attestation verify artifact/artifact.tar \
            --repo "${GITHUB_REPOSITORY}" \
            --signer-workflow "${GITHUB_REPOSITORY}/.github/workflows/deploy.yml" \
            --predicate-type https://cyclonedx.org/bom
          echo "Verified: SLSA provenance + CycloneDX SBOM for ${{ needs.build.outputs.artifact-digest }}"

  deploy:
    needs: verify
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      pages: write
      id-token: write
    steps:
      - id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4.0.5
